<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Viewport con safe-area para notch/home indicator -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Destino TV — Conecta con personas reales cerca de ti" />
    <title>Destino TV</title>

    <!-- Content Security Policy (defensa anti-XSS).
         script-src: requiere 'unsafe-inline' por Vite dev y framer-motion.
         img-src: https: + data: + blob: para uploads previews.
         connect-src: API propia + Supabase + LiveKit + Sentry. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https: wss: *.supabase.co *.livekit.cloud *.ingest.sentry.io https://api.openai.com; frame-src https://challenges.cloudflare.com https://js.stripe.com; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';">
    <!-- HSTS preload (también lo aplica el backend, pero meta es defensa en profundidad si el server no añade el header) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Destino TV — Conecta con personas reales" />
    <meta property="og:description" content="Matches, videollamadas, shows en vivo y mucho más. Únete a Destino TV hoy." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:site_name" content="Destino TV" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Destino TV — Conecta con personas reales" />
    <meta name="twitter:description" content="Matches, videollamadas, shows en vivo y mucho más. Únete a Destino TV hoy." />
    <meta name="twitter:image" content="/icon-512.png" />

    <!-- PWA / Mobile App -->
    <meta name="theme-color" content="#0d0d1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Destino TV" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload del CSS de Inter para que no bloquee render (display=swap ya está) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Preload del font file más usado (weight 500 para body) -->
    <link rel="preload" as="font" type="font/woff2" crossorigin
          href="https://fonts.gstatic.com/s/inter/v18/UcCO3FwrK3iLTeHuS_nVMrMxCp50ojIa1ZL7.woff2" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
