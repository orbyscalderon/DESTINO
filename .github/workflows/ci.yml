name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install
        working-directory: backend
        run: npm ci --no-audit --no-fund
      - name: Run tests
        working-directory: backend
        run: npm test

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund
      - name: Build
        working-directory: frontend
        env:
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
          VITE_API_URL: https://api.placeholder.com
        run: npm run build

  encuentros-build:
    name: Encuentros frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: encuentros/frontend/package-lock.json
      - name: Install
        working-directory: encuentros/frontend
        run: npm ci --no-audit --no-fund
      - name: Build
        working-directory: encuentros/frontend
        env:
          VITE_API_URL: https://api.placeholder.com
        run: npm run build
        continue-on-error: true  # encuentros es opcional; no bloquea PRs de la main app
